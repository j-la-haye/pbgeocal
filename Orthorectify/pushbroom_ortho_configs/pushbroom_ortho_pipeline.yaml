# =============================================================================
# Pushbroom Orthorectification Pipeline - Configuration
# =============================================================================
# Bottom-up (output-to-input) orthorectification of hyperspectral pushbroom
# imagery using decoupled across-track/along-track camera calibration.
# =============================================================================

# --- Input / Output Paths ---------------------------------------------------
paths:
  # Applanix SBET binary (17 double-precision fields per record, NED body frame)
  #sbet: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/DN_proc/25427_Thun_Colomb_Areuse/25_cal_ch/odyn_in_tp_unrect/output/SBET/SBET_Clmbr_Cal_ODyN_v8.out" 
  sbet: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/DN_proc/25427_Thun_Colomb_Areuse/M_001_CH_20250427_100239_OutC_POSTPROCESSING_SBET_Body_Frame.out"

  # ENVI BIL hyperspectral image + sidecar header
  bil_image: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/RGB/l5_rgb/bil_data/M024_250427_CHE_Colombier_Line_50001_131938_226_refl_rgb_650_550_450.bil"
  bil_header: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/RGB/l5_rgb/bil_data/M024_250427_CHE_Colombier_Line_50001_131938_226_refl_rgb_650_550_450.hdr"

  # Per-line exposure times: TEXT file, one GPS time per line,
  # in units of 10 microseconds (1e-5 seconds).
  # Example: a value of 123456789012 = 1234567.89012 GPS seconds.
  exposure_times: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/RGB/l5_rgb/bil_data/M024_250427_CHE_Colombier_Line_50001_131938_226_refl_rgb_650_550_450.bil.timing"

  # Lab-measured across-track angles: CSV with one angle [degrees] per line,
  # one entry per pixel (0-indexed), monotonically increasing.
  angle_lut: "Orthorectify/pushbroom_ortho_configs/AV4_acrosstrack_PSF_2024_valid_angles.csv"

  # Digital Surface Model (GeoTIFF, ellipsoidal heights)
  dsm: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/DSM/DSM_proc/wgs84/DSM_converted_ss3d/DSM_mosaic_M024_Clbr_L3_6_wgs84_ellipsoid_reframe.tif"

  # Output orthorectified GeoTIFF - {a},{b},{c},{fl},{cx},{cy},{gsd} are auto-substituted from camera.smile/optics/processing at load time.
  output: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/DN_proc/25427_Thun_Colomb_Areuse/25_cal_ch/odyn_in_tp_unrect/output/Orthos/L5/L5_stevi_model_fl_{fl}_gsd_{gsd}.tif"

# --- Coordinate Reference Systems -------------------------------------------
crs:
  # CRS of the DSM (EPSG code)
  dsm_epsg: 4979          # UTM Zone 32N (WGS84)

  # CRS of the output orthophoto
  output_epsg: 2056        # LV95 / CH1903+ (EPSG:2056)

  # SBET datum (always WGS84 for Applanix)
  sbet_ellipsoid: "WGS84"

# --- Camera Model (Steviapp) -----------------------------------------------
# Pinhole projection with degree-5 polynomial lens distortion, jointly
# optimised with focal length and boresight from image tie-points.
#
# Projection model (Steviapp eq. 1):
#   u = f · (Xc/Zc) + ppx − Δx(u)      across-track pixel
#   v = f · (Yc/Zc) − Δy(u)             along-track → 0 at correct time
#
# Distortion polynomials:
#   Δx(u) = a0 + a1·ξ + a2·ξ² + a3·ξ³ + a4·ξ⁴ + a5·ξ⁵
#   Δy(u) = b0 + b1·ξ + b2·ξ² + b3·ξ³ + b4·ξ⁴ + b5·ξ⁵
#   ξ = (u − w/2) / w
#
# Sign convention for Δy:
#   The calibration is done in camera frame (Y-back, Z-down).
#   Δy(u) is in pixel units in the camera v-direction.
#   The Newton solver drives:  f·(Yc/Zc) − Δy(u) → 0.
#
# Reference:
#   Barmettler et al. (2025), "Quality assessment of Airborne Image
#   Spectrometry Data for AVIRIS-4", doi:10.13140/RG.2.2.17556.17287
camera:
  focal_length:    1690.35      # f [pixels]
  principal_point:  628.0674    # ppx [pixels] (optical axis position)
  detector_width:  1240         # w [pixels] — normalisation base for ξ

  # Degree-5 lens distortion polynomials
  # These coefficients are from the Steviapp factor-graph optimisation.
  # Replace with your calibrated values.
  distortion:
    # Across-track:  Δx(u) [pixels]
    # Encodes the difference between ideal pinhole and actual pixel position.
    # With all zeros → pure pinhole (no across-track distortion correction).
    delta_x: [5.7269156133e-01, -4.5834874563e+01, -5.9361058186e+00, 2.8091178965e+02, -5.2026086449e+00, 1.2485813975e+02]

    # Along-track (smile):  Δy(u) [pixels]
    # Encodes the along-track scanline curvature (smile).
    # With all zeros → no smile correction (flat scanlines).
    delta_y: [-1.8208505933e+01, -2.5911822005e+00, 1.6959619968e+02, -8.6237018919e-01, 2.9786306664e+01, -7.0731652175e-01]

# --- Camera Model (Decoupled) -----------------------------------------------
# Across-track: Lab-measured angle LUT (loaded from paths.angle_lut)
# Along-track:  Smile polynomial  θ_at(xt) = a·xt² + b·xt + c
#               where xt = tan(θ_across_track), angles in degrees.
#
#  # Along-track smile model: θ_at(xt) = a·xt² + b·xt + c, where xt = tan(θ_across_track).
#a = -0.0036022
#b = 0.0003831
#c = 0.6025328
#at = a * xt**2 + b*xt + c
# The constant c is the boresight along-track offset (sensor line not at θ_y=0).
# The quadratic a captures the parabolic smile curvature.
# The linear b captures asymmetric tilt of the smile.
# camera:
#   smile:
#     a: -0.004          # quadratic (smile curvature)
#     b: -0.2 #0.0003          # linear (smile tilt)
#     c:  3.0         # constant (along-track boresight offset, degrees)

  # In-flight focal length and principal point correction.
  #
  # The lab LUT defines the reference geometry, including the optical axis
  # position (the zero-angle crossing, at pixel ~627.78 for this sensor,
  # NOT the geometric detector center at 619.5).
  #
  # In flight, thermal expansion and pressure changes shift f and the
  # principal point.  These parameters are estimated separately (e.g. from
  # tie points in an external bundle adjustment) and entered here as fixed
  # values for the ortho run.
  #
  # f_lab : effective lab focal length in pixels (from LUT mean IFOV)
  # f     : in-flight focal length in pixels (= f_lab for no correction)
  # cx    : across-track PP shift [pixels] relative to lab-calibrated
  #         optical axis position.  cx=0 means no shift from lab.
  #         Positive = optical axis moved rightward (toward higher pixel #).
  # cy    : along-track PP shift [pixels] relative to lab.  cy=0 = no shift.
  #         Positive = optical axis moved in +Y camera direction (backward).
  #
  # NOTE: cx is NOT an absolute pixel position.  The LUT already encodes
  # where the optical axis falls (~pixel 627.78).  cx only captures
  # the CHANGE from that lab reference due to in-flight conditions.
  # optics:
  #   f_lab: 1732.63             # lab focal length [pixels] (from mean IFOV of angle LUT)
  #   f:     1697.63            # in-flight focal length [pixels] (= f_lab if no correction)
  #   cx:    -30.5              # across-track PP shift [pixels] from lab optical axis (0 = no shift)
  #   cy:    0.0               # along-track  PP shift [pixels] from lab optical axis (0 = no shift)
  # If the LUT covers the full BIL detector width, set to 0.
  first_valid_pixel: 0

# --- Mounting / Lever-Arm / Boresight ----------------------------------------
# All values define the spatial and angular relationship between the IMU
# (Applanix body frame, NED) and the camera sensor.
mounting:
  # Lever-arm from IMU to camera in the BODY frame [m]
  # body frame: X-forward (North), Y-right (East), Z-down
  lever_arm:
    x:  -0.05493              # forward  (m)
    y: 0.25697              # right    (m)
    z:  0.26223              # down     (m)
 
  # Boresight angles: small rotations from body frame to camera frame [degrees]
  # Applied as Rz(yaw) @ Ry(pitch) @ Rx(roll) on top of the mounting matrix
  boresight:
    roll:   0 #-0.292           # degrees, about body X (forward)
    pitch: 0 #0.178          # degrees, about body Y (right)
    yaw:   0 #-0.10275        # degrees, about body Z (down)

  # Mounting matrix: fixed rotation from body NED to camera frame
  # Camera frame: X-right, Y-back, Z-down
  # Body NED:     X-north (forward), Y-east (right), Z-down
  #
  # For a forward-looking pushbroom with X-right, Y-back, Z-down:
  #   cam_X = body_Y   (right = east)
  #   cam_Y = -body_X  (back  = -north)
  #   cam_Z = body_Z   (down  = down)
  #
  # Mounting matrix M:  P_cam = M @ P_body
  mounting_matrix:
    - [ 0.0,  1.0,  0.0]    # cam_X = body_Y
    - [-1.0,  0.0,  0.0]    # cam_Y = -body_X
    - [ 0.0,  0.0,  1.0]    # cam_Z = body_Z

# --- Processing Parameters --------------------------------------------------
processing:
  # Output ground sample distance (meters)
  output_gsd: 1.0

  # Tile size for parallel processing (pixels)
  tile_size: 512

  # Number of parallel worker processes
  num_workers: 4

  # Newton iteration parameters for time solving
  newton:
    max_iterations: 15
    convergence_threshold: 1.0e-09   # seconds
    numerical_dt: 1.0e-06            # seconds, for numerical Jacobian

  # Resampling method for BIL pixel lookup: "bilinear" or "nearest"
  resampling: "bilinear"

  # Visibility / occlusion check
  visibility:
    enabled: true
    # Number of samples along the sensor-to-ground ray for occlusion test
    num_ray_samples: 50
    # Height tolerance above ray (meters) — DSM cells this far above the ray
    # are considered occluding
    height_tolerance: 0.5

  # NODATA value for output GeoTIFF
  nodata: -99999
