# =============================================================================
# Pushbroom Orthorectification Configuration
# =============================================================================

camera:
  focal_length_px: 12500.0          # focal length in pixels
  principal_point_x: 4096.0         # cross-track principal point (px)
  sensor_width_px: 8192             # pixels per scanline
  distortion:                       # Brown-Conrady model
    k1: -1.5e-8
    k2:  3.0e-15
    p1:  0.0
    p2:  0.0

mounting:
  # Nominal mounting matrix: body-NED [fwd, right, down] → camera [x, y, z]
  # Typical nadir pushbroom: x=right-wing, y=forward, z=down
  matrix:
    - [ 0,  1,  0]
    - [-1,  0,  0]
    - [ 0,  0,  1]
  # Boresight fine-correction angles applied ON TOP of mounting matrix (radians)
  boresight_roll:  0.0
  boresight_pitch: 0.0
  boresight_yaw:   0.0
  # Lever arm: IMU centre → camera projection centre, in body-NED frame [fwd, right, down] (m)
  lever_arm: [0.15, -0.02, 0.35]

inputs:
  sbet_path:           "/data/flight/sbet.out"
  bil_path:            "/data/imagery/line001.bil"
  exposure_times_path: "/data/imagery/line001_times.txt"   # one GPS-second per line
  dsm_path:            "/data/dsm/dsm_ellipsoidal.tif"     # ellipsoidal heights

outputs:
  ortho_path: "/data/output/ortho_line001.tif"
  gsd: 0.10            # output pixel spacing (metres) in the output CRS

crs:
  input_sbet: "EPSG:4326"   # WGS84 geodetic (SBET is always WGS84)
  dsm:        "EPSG:2056"   # CRS of the DSM raster (Swiss LV95)
  output:     "EPSG:2056"   # target ortho CRS

# ── Georeferencing fine-tuning ─────────────────────────────────────────
# These parameters address systematic spatial offsets in the orthophoto.
georef:
  # Time offset (seconds) added to ALL exposure times before they are
  # used to query the SBET trajectory.
  #
  # Purpose: absorb the latency between the GPS PPS trigger and the
  # actual mid-exposure instant.  Typical sources:
  #   – camera electronics delay after PPS (often 0.2–2 ms)
  #   – half the integration time (if times mark start-of-exposure)
  #   – systematic clock drift between GPS receiver and frame grabber
  #
  # Sign convention:
  #   positive  →  shifts the image FORWARD  along the flight direction
  #   negative  →  shifts the image BACKWARD along the flight direction
  #
  # Calibration procedure:
  #   1. Orthorectify with time_offset = 0.
  #   2. Identify a sharp ground feature (road marking, building corner).
  #   3. Measure the along-track displacement Δd (metres) in the ortho.
  #   4. Compute: time_offset ≈ Δd / ground_speed
  #      (ground_speed ~ 60 m/s for typical aerial survey)
  #   5. Re-run and verify.
  time_offset: 0.0

processing:
  tile_size: 512             # output tile edge length (pixels)
  num_workers: 8             # ProcessPoolExecutor workers
  max_iterations: 20         # Newton convergence ceiling
  convergence_tol: 1.0e-7    # along-track angle tolerance (rad) ≈ 0.02 px @ f=12500
  nodata: 0

  # ── Anti-curtaining parameters ──────────────────────────────────────
  # Multiplier on the geometric half-swath width for the pre-filter.
  # 1.0 = exact FOV boundary.  1.2 = 20% buffer for terrain relief and
  # aircraft roll.  Increase if valid edge pixels are being clipped.
  swath_buffer: 1.2

  # Absolute residual threshold for the Newton post-filter (radians).
  # Points where |along-track residual| > this are rejected even if
  # the solver flagged them as "converged".
  # Default: 100 × convergence_tol.  Tighten if curtain remnants persist.
  residual_tolerance: 1.0e-5
