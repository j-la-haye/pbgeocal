# DSM Tile Conversion Configuration
# Converts Swiss LV95/LN02 GeoTiff tiles to WGS84/ETRS89

# Input/Output directories
input_dir: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/DTM/L1_2/lv95_ln02"
output_dir: "/media/addLidar/AVIRIS_4_Testing/SteviApp_TiePoint_Testing/HS_Data_Lines/DTM/L1_2/wgs84"

# Coordinate Reference Systems
source_crs:
  planimetric: "EPSG:2056"  # LV95 (CH1903+)
  altimetric: "LN02"         # Swiss leveling network (geoid-based heights)

target_crs: "EPSG:4979"  # WGS84 3D (lon, lat, ellipsoidal height)
# Alternative targets:
# - "EPSG:4326" for WGS84 2D (lon, lat only)
# - "EPSG:4258" for ETRS89 2D
# - "EPSG:4937" for ETRS89 3D

# Transformation method
# Options: "auto", "reframe", "pyproj"
# - "auto": Produce BOTH pyproj and reframe outputs for comparison (recommended for evaluation)
# - "reframe": Use SwissTopo Reframe API only (requires network)
# - "pyproj": Use pyproj only (works offline, uses approximate geoid if grids missing)
transformation_method: "pyproj"

# SwissTopo Reframe API settings
reframe_api:
  base_url: "https://geodesy.geo.admin.ch/reframe"
  # Transformation format for Reframe API
  # lv95_to_etrf93: LV95/LN02 -> ETRF93 (compatible with WGS84/ETRS89)
  format: "lv95"
  timeout: 30  # seconds per request
  max_retries: 3
  retry_delay: 1.0  # base delay for exponential backoff
  batch_size: 100  # points per batch for progress reporting
  
  # Parallel processing settings (HIGHLY RECOMMENDED for speed)
  parallel_requests: 10  # Number of concurrent API requests (1 = sequential, 10-50 = fast)
  
  # Interpolation settings for large rasters
  # Instead of transforming every pixel, sample a grid and interpolate
  use_interpolation: true  # true = fast (sample + interpolate), false = transform every pixel
  sample_spacing: 10  # Sample every N pixels for interpolation grid (smaller = more accurate, slower)
  
  # Proxy configuration (uncomment if needed)
  # Option 1: Explicit proxy URL
  # proxy: "http://proxy.example.com:8080"
  
  # Option 2: Use system/environment proxy (default)
  # Set these environment variables before running:
  #   export HTTPS_PROXY=http://proxy.example.com:8080
  #   export NO_PROXY=localhost,127.0.0.1
  
  # Option 3: Bypass proxy for Swiss government domains
  # Add to NO_PROXY: export NO_PROXY=$NO_PROXY,geo.admin.ch

# Processing options
processing:
  # Resampling method for warped output
  resampling: "bilinear"  # Options: nearest, bilinear, cubic, lanczos
  # Output data type (preserve original if null)
  output_dtype: null
  # NoData value
  nodata: -99999
  # Compression for output GeoTiffs
  compression: "DEFLATE"  # Options: NONE, LZW, DEFLATE, etc.
  # Add compression predictor
  compression_predictor: 3
  # Number of parallel workers
  num_workers: 4
  # Sample grid spacing for accuracy comparison (in pixels)
  comparison_sample_spacing: 10

# Accuracy evaluation
evaluation:
  enabled: true
  output_report: "conversion_report.json"
  output_csv: "accuracy_stats.csv"
  # Percentiles to compute for error statistics
  percentiles: [50, 90, 95, 99]
